<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Watermelon Shooter UI</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- LEADERBOARD -->
    <div id="leaderboard" class="panel">
      <h2>🍉 Top Melons 🍉</h2>
    </div>

    <!-- POWER UPS -->
    <div id="powerups" class="panel">
      <div class="combo" style="display: none"></div>
    </div>

    <!-- KILL FEED -->
    <div id="killfeed" class="panel"></div>

    <!-- WEAPON -->
    <div id="weapon" class="panel">
      <div class="ammo">🍉 <span id="ammoCount"> 0 </span></div>
    </div>

    <!-- HEALTH BAR -->
    <div id="healthMenu" class="panel">
      <div id="healthbar">
        <div id="health-label">HP</div>
        <div id="health-pips"></div>
      </div>
      <div id="health-label">Press H for menu</div>
    </div>

    <!-- External JavaScript -->
    <script src="index.js"></script>
  </body>
</html>
