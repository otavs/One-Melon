<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Watermelon Shooter UI</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- LEADERBOARD -->
    <div id="leaderboard" class="panel" style="display: none">
      <h2>🍉 Top Melons 🍉</h2>
    </div>

    <!-- POWER UPS -->
    <div id="powerups" class="panel" style="display: none">
      <div class="combo" style="display: none"></div>
    </div>

    <!-- COUNTDOWN (Lobby state — same position as powerups) -->
    <div id="countdown" class="panel" style="display: none">
      <div class="countdown-label">Starting in</div>
      <div class="countdown-number">-</div>
    </div>

    <!-- KILL FEED -->
    <div id="killfeed" class="panel" style="display: none"></div>

    <!-- WEAPON -->
    <div id="weapon" class="panel" style="display: none">
      <div class="ammo">🍉 <span id="ammoCount"> 0 </span></div>
    </div>

    <!-- HEALTH BAR -->
    <div id="healthMenu" class="panel" style="display: none">
      <div id="healthbar">
        <div id="health-label">HP</div>
        <div id="health-pips"></div>
      </div>
      <div id="health-label">Press H for help</div>
    </div>

    <!-- FINAL SCORES (Post-game state — full overlay) -->
    <div id="finalScores" class="panel overlay-card" style="display: none">
      <h2>🍉 Final Scores 🍉</h2>
      <!-- TODO: tables and stats -->
    </div>

    <!-- HELP MENU (shown on H key) -->
    <div
      id="helpMenu"
      class="panel overlay-card overlay-card--sm"

    >
      <button class="help-close" onclick="hideHelpUI()">X</button>

      <img src="img/title.png" class="help-title-img" alt="One Melon" />

      <div class="help-scoring-line">1 bonk = 1 point</div>

      <div class="help-scenarios">
        <div class="help-scenario-1">
          <img src="img/bonk melon.png" class="help-scenario-img" alt="Melon Gun" />
        </div>
        <div class="help-or">or</div>
        <div class="help-scenario-2">
          <div class="help-bonk-right-row">
            <span class="help-3x">3x</span>
          </div>
          <img
            src="img/bonk.png"
            class="help-scenario-img"
            alt="Bonker"
          />
        </div>
      </div>

      <div class="help-scoring-line">
        30 points = 
        <span> Win </span>
      </div>

      <div class="help-controls">
        <div>
          <p>
            <span>Change weapon: </span>
            Q 
            <span> or </span>
            1,2
            <span> or </span>
            Scroll
          </p>
          <p><span>Change skin: </span> J</p>
          <p>
            <span>Recharge melon gun: </span>
            bonk
            <span>or</span>
            die
          </p>
        </div>
        <div class="help-controls-right-col">
          <div>&nbsp</div>
          <p><span>Change hat: </span> K</p>
        </div>
      </div>
    </div>

    <!-- External JavaScript -->
    <script src="index.js"></script>
  </body>
</html>
